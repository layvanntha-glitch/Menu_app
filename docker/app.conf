# Silence the FQDN warning.
ServerName localhost

# Let the app's .htaccess files work (data/ deny, uploads/ php-off).
<Directory /var/www/html>
    Options Indexes FollowSymLinks
    AllowOverride All
    Require all granted
</Directory>

# The app lives under /menu/ — send the bare domain there.
RedirectMatch ^/$ /menu/
